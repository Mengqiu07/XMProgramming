<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>【社团新闻】计算机社正式成立 · 向明中学计算机社</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap">
  <style>
    :root {
      --bg: #020810;
      --card-bg: rgba(8, 18, 40, 0.75);
      --primary: #00e5ff;
      --text: #d0d8e8;
      --text-dim: #8899bb;
      --border: rgba(0, 229, 255, 0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', 'Rajdhani', sans-serif;
      min-height: 100vh;
      line-height: 1.7;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 60px 20px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      margin-bottom: 32px;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--primary); }
    .article-card {
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 25px 80px rgba(0, 212, 255, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .article-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }
    .article-meta span {
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
    }
    .article-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 2px;
      margin-bottom: 24px;
      text-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
    }
    .article-body {
      font-size: 15px;
      line-height: 2;
      color: var(--text);
    }
    .article-body strong { color: var(--primary); }
    .article-body img { max-width: 100%; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="index.html">← 返回社团文章</a>
    <div class="article-card">
      <div class="article-meta">
        <span>2026年6月24日</span>
        <span>📝 计算机社</span>
        <span>🏷️ 社团新闻</span>
      </div>
      <h1 class="article-title">【社团新闻】计算机社正式成立</h1>
      <div class="article-body">
        <p>今天，我校团委学生会社团部给予我社答复：学校正式通过社团成立申请。计算机社于2026年6月24日正式成立。社团正式定名为计算机社，社团地点为上海市向明中学（西部校区）创新协会楼5206教室，我校信息组马老师担任指导老师，李羿嵘担任社长。社团将围绕C++程序设计、HTML网页设计、unity游戏设计展开社团活动。社团活动实施分层活动，为多方面人才考虑。欢迎新高一、高二学生报名加入。</p>
      </div>
    </div>
  </div>
</body>
</html>
