      <h1 class="article-title">【社员风采】我社社长李羿嵘在交大领队得奖</h1>
      <div class="article-body">
        <p>今天，李羿嵘担任组长，与来自上海市向明中学2028届王睿捷、江好悦、邬正豪和张致远的组员组成HTML网页设计制作小组共同设计了模拟校园证券交易所的网站，该网站获得了&nbsp;2026上海交通大学人工智能研究院走进人工智能暑期挑战营最佳人气奖。这一结果是由学生、老师、领导和教授共同投票的结果，也是该训练营网页设计的唯一奖项。上海市黄浦区教育局副局长刘丹同志为我们颁奖。</p>
